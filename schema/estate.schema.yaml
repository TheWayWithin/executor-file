# ─────────────────────────────────────────────────────────────
# Executor File — annotated schema reference (format 3)
#
# The single source of truth for the schema is
# schema/estate.schema.json (JSON Schema 2020-12) — any standard
# tool can validate a register against it without our scripts.
# THIS file is the human-readable, annotated companion; the strict
# validator (scripts/validate.py) loads it for its rule set, and a
# CI drift test (tests/schema-agreement.py) fails the build if the
# two files ever disagree on fields, enums, or requiredness — no
# hand-maintained duplicates.
#
# Golden rules, enforced by the validators where a machine can:
#   1. No credentials. Ever. No passwords, no full account numbers,
#      no seed phrases, no PINs. Pointers only.
#   2. `type` and `preferred_action` are the load-bearing fields:
#      `preferred_action` tells the executor what you want done;
#      everything else exists to help them find the asset.
#   3. `identifier` is a last-4 or a reference — enough for the
#      executor to name the asset to a provider, never enough for
#      anyone to use it.
#
# Legal position, carried verbatim wherever preferred_action is
# documented: preferred actions are practical guidance, subject to
# the will, beneficiary designations, ownership rights, provider
# terms, and applicable law.
#
# MIGRATING FROM FORMAT 2 (validators accept both for this one
# version, and warn on 2):
#   1. meta: change `format_version: 2` to `format_version: 3`.
#   2. meta: replace `jurisdiction_primary:` / `jurisdiction_secondary:`
#      with one line listing them all:  jurisdictions: [US-NY, UK]
#   3. every asset with `status: active` must now carry
#      `last_confirmed:` — a date, or the literal `unknown` if you
#      honestly don't know (that is a signal, not a failure).
#   Everything else is additive: first_step, depends_on, beneficiary,
#   billing_cycle, the settle/preserve actions, and the contacts and
#   documents sections are new, optional, and worth filling in.
# ─────────────────────────────────────────────────────────────

version: 3

sections:

  meta:
    required: true
    kind: map
    doc: Who this register belongs to and where credentials actually live.
    fields:
      format_version:
        required: true
        type: int
        values_int: [3]
        doc: >
          Schema format of this file. Must be 3. Registers without it are
          treated as format 1 and get a migrate message, never a silent
          misparse; format 2 still validates this version, with a warning.
      owner:
        required: true
        type: string
        doc: Full legal name of the register's owner.
      updated:
        required: true
        type: date
        doc: >
          Date of last review (YYYY-MM-DD). A stale register misleads the
          executor — update it at every will review, at minimum.
          scripts/review.sh bumps this automatically.
      jurisdictions:
        required: true
        type: list_of_strings
        doc: >
          Every legal system the estate touches, e.g. [US-NY, UK].
          Replaces format 2's primary/secondary pair, which could not
          model NY + UK + an online business incorporated elsewhere.
          (Baseline validator reads the inline [a, b] form.)
      domicile:
        required: false
        type: string
        doc: >
          Jurisdiction of legal domicile, if worth stating separately —
          it usually decides which law governs the estate.
      residence:
        required: false
        type: string
        doc: Jurisdiction of tax residence at last review, if different.
      password_manager:
        required: true
        type: string
        doc: >
          Which password manager holds the actual credentials and how the
          executor gets emergency access to it (e.g. "1Password. Executor
          access via its Emergency Kit, held by [name]."). This is a
          pointer, never a secret.
      notes:
        required: false
        type: string
        doc: Free-text context for the executor.

  assets:
    required: true
    kind: list
    min_items: 1
    doc: One entry per account, asset, or liability. If it would surprise or cost the estate, it belongs here.
    item_fields:
      id:
        required: true
        type: string
        pattern: "^A[0-9]{3,}$"
        unique: true
        doc: Stable unique reference — A001, A002, … Never reuse an ID.
      provider:
        required: true
        type: string
        doc: Institution or service name as the executor would search for it.
      type:
        required: true
        type: enum
        values: [cash, liability, subscription, holding, crypto, online-business, other]
        doc: >
          What kind of thing this is. "crypto" entries are treated as high
          priority — a missed wallet is unrecoverable, not merely delayed.
      identifier:
        required: true
        type: string
        doc: >
          Last-4 digits or a reference ONLY — "current a/c …1234". Never a
          full account number, never a credential. The validator rejects
          long digit runs.
      priority:
        required: true
        type: enum
        values: [critical, high, normal, low]
        doc: >
          Triage order for the executor; renderers sort on it. Crypto and
          anything bleeding money monthly belong at critical or high. The
          validator warns if a crypto asset is below high.
      ownership:
        required: true
        type: enum
        values: [sole, joint, beneficiary-designated, trust, business-owned, unknown]
        doc: >
          How the asset is legally held. A joint account and a sole account
          cannot share a generic "liquidate" — ownership decides what the
          executor may lawfully do before anything else does.
      status:
        required: true
        type: enum
        values: [active, closed]
        doc: >
          Default guidance is "active". Mark closed accounts closed instead
          of deleting the entry — a trail beats a vanishing. Active entries
          must carry last_confirmed.
      last_confirmed:
        required: false
        required_when_active: true
        type: date_or_unknown
        doc: >
          When you last confirmed this entry is still accurate
          (YYYY-MM-DD), or the literal `unknown` as an honest signal.
          REQUIRED whenever status is active — a missing freshness signal
          is a defect the validator surfaces, not a default it fills in.
          The strict validator warns when it is older than 18 months.
      jurisdiction:
        required: false
        type: string
        doc: Where this asset legally sits, if different from meta.
      approx_value:
        required: false
        type: string
        doc: >
          Rough value or cost, as text ("£12k", "liability ~$60/mo"). Helps
          the executor triage; precision is not the point.
      preferred_action:
        required: true
        type: enum
        values: [liquidate, cancel, transfer, delete, notify-only, settle, preserve]
        doc: >
          What you want done. liquidate = sell/withdraw into the estate;
          cancel = stop the service/charge; transfer = pass to a named
          person (name them in `beneficiary`); delete = close and erase;
          notify-only = inform the provider, no other action expected;
          settle = pay off a debt from the estate; preserve = keep it
          alive and intact (data, creative work, a running business).
          Preferred actions are practical guidance, subject to the will,
          beneficiary designations, ownership rights, provider terms, and
          applicable law.
      first_step:
        required: false
        type: string
        doc: >
          What the executor should do NOW, decoupled from the eventual
          disposition — "Secure the device and recovery material. Do not
          transfer yet." One honest sentence beats modelling probate law.
      depends_on:
        required: false
        type: list_of_ids
        doc: >
          Record IDs that must be dealt with before this one, e.g.
          [A006] when the safe deposit box holds this wallet's seed.
          The renderer orders work with it; the validator checks the
          IDs exist. (Baseline validator reads the inline [a, b] form.)
      beneficiary:
        required: false
        type: string
        doc: >
          Who receives this asset when preferred_action is transfer — a
          name the executor can act on, out of the prose and into a
          sortable field.
      billing_cycle:
        required: false
        type: enum
        values: [monthly, annual, one-off]
        doc: >
          For liabilities and subscriptions: how often it bills, so the
          renderer can sort by burn rate.
      action_notes:
        required: true
        type: string
        doc: >
          The preferred action in your own words — the executor acts on
          this. Name names, state the destination, flag anything
          time-critical.
      access_pointer:
        required: false
        recommended: true
        type: string
        doc: >
          Where the login lives (e.g. "1Password > HSBC") or where a
          physical key is kept. A signpost, not a secret.

  contacts:
    required: false
    kind: list
    doc: >
      People the executor will need: solicitor, accountant, adviser,
      business partner, technically trusted helper, share holders.
      Pointers, not sensitive contents.
    item_fields:
      role:
        required: true
        type: string
        doc: What this person is to the estate — solicitor, accountant, share-holder, technical helper, …
      name:
        required: true
        type: string
        doc: Who they are.
      pointer:
        required: false
        type: string
        doc: >
          How to reach them or where their details live. Phone numbers are
          fine here (the no-secrets scan allows them in contacts); account
          numbers and credentials are not.
      note:
        required: false
        type: string
        doc: Why they matter, e.g. "holds the original will".

  documents:
    required: false
    kind: list
    doc: >
      Where the paper lives: will, deeds, insurance schedules,
      statements. Discovery, not probate automation.
    item_fields:
      name:
        required: true
        type: string
        doc: What the document is — "Will (original)", "House deeds", …
      location:
        required: true
        type: string
        doc: Where it physically or digitally lives.
      note:
        required: false
        type: string
        doc: Anything the executor should know about it.

  platform_legacy_tools:
    required: false
    kind: list
    doc: >
      Platform-native legacy settings (Apple Legacy Contact, Google
      Inactive Account Manager, Meta Legacy Contact). Recorded here because
      under RUFADAA-style law these designations legally outrank the will —
      the executor must know they exist and who was named.
    item_fields:
      platform:
        required: true
        type: string
        doc: Apple, Google, Meta, …
      tool:
        required: true
        type: string
        doc: The platform's name for it, e.g. "Legacy Contact".
      configured:
        required: true
        type: bool
        doc: Set true only once actually configured on the platform.
      contact:
        required: false
        type: string
        doc: Who was designated, so the executor knows whom to coordinate with.
