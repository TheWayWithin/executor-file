# ─────────────────────────────────────────────────────────────
# Executor File — EXAMPLE register (safe dummy data, format 3)
#
# Copy this file to estate.yaml at the repo root, replace every
# entry with your own, then run:  scripts/validate.sh
#
# estate.yaml is git-ignored. This example is the only register
# that may ever be committed. Notice what is NOT here: no
# passwords, no full account numbers, no seed phrases. Pointers
# only — the executor gets credentials from the password manager.
#
# preferred_action is guidance, not law: preferred actions are
# practical guidance, subject to the will, beneficiary
# designations, ownership rights, provider terms, and applicable
# law.
#
# first_step is what the executor does NOW (usually: secure,
# don't dispose); preferred_action is the eventual disposition.
# depends_on orders the work: [A006] means "deal with A006 first".
# ─────────────────────────────────────────────────────────────

